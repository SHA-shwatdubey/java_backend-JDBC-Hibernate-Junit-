# Application Configuration
spring.application.name=cachepractice
server.port=8085

# Disable Database Auto-configuration (since we are using in-memory repository)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Cache Configuration - Using Redis
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000

# Disable Favicon (prevent 404 errors)
spring.mvc.favicon.enabled=false

# Logging Configuration
logging.level.org.springframework.cache=TRACE
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.springframework.web.servlet.resource=ERROR
